<div class="page">

  <!-- Toast -->
  <div class="toast" *ngIf="mensaje" [ngClass]="tipoMensaje">
    {{ mensaje }}
  </div>

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Clientes</h1>
      <p class="page-subtitle">Gestión de la base de datos de clientes</p>
    </div>
    <button class="btn-primary" (click)="abrirModalCrear()">
      + Nuevo Cliente
    </button>
  </div>

  <!-- Filtros -->
  <div class="filters-card">
    <div class="filter-group">
      <label>Buscar por nombre</label>
      <input type="text" [(ngModel)]="searchNombre" placeholder="Ej: Juan García..." />
    </div>
    <div class="filter-group">
      <label>Buscar por documento</label>
      <input type="text" [(ngModel)]="searchDocumento" placeholder="Ej: 123456789..." />
    </div>
    <button class="btn-search" (click)="buscarPorDocumento()">🔍 Buscar</button>
    <button class="btn-reset" (click)="cargarClientes()">↺ Resetear</button>
  </div>

  <!-- Tabla -->
  <div class="table-card">
    <div *ngIf="loading" class="loading">
      <div class="spinner"></div>
      <p>Cargando clientes...</p>
    </div>

    <table *ngIf="!loading">
      <thead>
      <tr>
        <th>Documento</th>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngIf="clientesFiltrados.length === 0">
        <td colspan="4" class="empty">No se encontraron clientes</td>
      </tr>
      <tr *ngFor="let cliente of clientesFiltrados">
        <td><span class="badge">{{ cliente.documento }}</span></td>
        <td>{{ cliente.nombre }}</td>
        <td>{{ cliente.telefono }}</td>
        <td class="actions">
          <button class="btn-edit" (click)="abrirModalEditar(cliente)">✏️</button>
          <button class="btn-delete" (click)="eliminar(cliente.documento)">🗑️</button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" *ngIf="mostrarModal" (click)="cerrarModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ editando ? 'Editar Cliente' : 'Nuevo Cliente' }}</h2>
        <button class="modal-close" (click)="cerrarModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Documento</label>
          <input type="text" [(ngModel)]="formData.documento" [disabled]="editando" placeholder="Número de documento" />
        </div>
        <div class="form-group">
          <label>Nombre Completo</label>
          <input type="text" [(ngModel)]="formData.nombre" placeholder="Nombre completo" />
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" [(ngModel)]="formData.telefono" placeholder="Número de teléfono" />
        </div>
        <button class="btn-primary full" (click)="guardar()">
          {{ editando ? 'Actualizar' : 'Crear' }} Cliente
        </button>
      </div>
    </div>
  </div>

</div>
